x-common-env: &common-env
  ENVIRONMENT: ${ENVIRONMENT:-development}
  LOG_LEVEL: ${LOG_LEVEL:-INFO}
  NATS_URL: nats://nats:4222
  REDIS_URL: redis://redis:6379/0
  DATABASE_URL: postgresql+asyncpg://aibe:${POSTGRES_PASSWORD:-changeme}@postgres:5432/aibe
  VAULT_ADDR: http://vault:8200
  OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
  OPENVIKING_CONNECTION_STRING: ${OPENVIKING_CONNECTION_STRING}
  OPENVIKING_API_KEY: ${OPENVIKING_API_KEY}
  CLICKHOUSE_HOST: clickhouse
  CLICKHOUSE_PORT: "9000"
  CLICKHOUSE_USER: aibe
  CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-changeme}
  CLICKHOUSE_DATABASE: aibe_analytics

services:
  # ═══════════════════════════════════════════════
  # CORE INFRASTRUCTURE
  # ═══════════════════════════════════════════════
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: aibe
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: aibe
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U aibe" ]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  nats:
    image: nats:2.10-alpine
    restart: unless-stopped
    command: >
      -js --store_dir /data --max_payload 8MB -m 8222
    ports:
      - "4222:4222"
      - "8222:8222"
    volumes:
      - nats_data:/data
    healthcheck:
      test: [ "CMD", "wget", "--spider", "-q", "http://localhost:8222/healthz" ]
      interval: 10s
      timeout: 5s
      retries: 5

  clickhouse:
    image: clickhouse/clickhouse-server:24-alpine
    restart: unless-stopped
    environment:
      CLICKHOUSE_USER: aibe
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-changeme}
      CLICKHOUSE_DB: aibe_analytics
    ports:
      - "8123:8123"
      - "9000:9000"
    volumes:
      - clickhouse_data:/var/lib/clickhouse
    healthcheck:
      test: [ "CMD", "clickhouse-client", "--query", "SELECT 1" ]
      interval: 10s
      timeout: 5s
      retries: 5

  vault:
    image: hashicorp/vault:1.17
    restart: unless-stopped
    cap_add:
      - IPC_LOCK
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: ${VAULT_TOKEN:-changeme}
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
    ports:
      - "8200:8200"
    volumes:
      - vault_data:/vault/data
    healthcheck:
      test: [ "CMD", "vault", "status" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # ═══════════════════════════════════════════════
  # APPLICATION SERVICES
  # ═══════════════════════════════════════════════
  api:
    build:
      context: .
      dockerfile: Dockerfile.backend
    restart: unless-stopped
    environment:
      <<: *common-env
      SECRET_KEY: ${SECRET_KEY:-changeme-to-random-64-char-string}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      nats:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/api/health" ]
      interval: 15s
      timeout: 5s
      retries: 3
    command: uvicorn aibe.ui.backend.app:app --host 0.0.0.0 --port 8000 --workers 4

  worker-default:
    build:
      context: .
      dockerfile: Dockerfile.backend
    restart: unless-stopped
    environment:
      <<: *common-env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      nats:
        condition: service_healthy
    command: celery -A aibe.workers.celery_app worker -l info -Q default -c 4

  worker-security:
    build:
      context: .
      dockerfile: Dockerfile.backend
    restart: unless-stopped
    environment:
      <<: *common-env
    depends_on:
      redis:
        condition: service_healthy
    command: celery -A aibe.workers.celery_app worker -l info -Q security -c 2

  worker-ml:
    build:
      context: .
      dockerfile: Dockerfile.backend
    restart: unless-stopped
    environment:
      <<: *common-env
      MODAL_TOKEN_ID: ${MODAL_TOKEN_ID}
      MODAL_TOKEN_SECRET: ${MODAL_TOKEN_SECRET}
      WANDB_API_KEY: ${WANDB_API_KEY}
    depends_on:
      redis:
        condition: service_healthy
    command: celery -A aibe.workers.celery_app worker -l info -Q ml -c 2

  celery-beat:
    build:
      context: .
      dockerfile: Dockerfile.backend
    restart: unless-stopped
    environment:
      <<: *common-env
    depends_on:
      redis:
        condition: service_healthy
    command: celery -A aibe.workers.celery_app beat -l info --schedule /tmp/celerybeat-schedule

  frontend:
    build:
      context: ./aibe/ui/frontend
      dockerfile: ../../../Dockerfile.frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - api
  # ═══════════════════════════════════════════════
